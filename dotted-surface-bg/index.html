<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Dotted Surface — Background Preview</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		html, body {
			width: 100%;
			height: 100%;
			overflow: hidden;
			background: transparent;        /* IMPORTANT: keep body transparent so the canvas shows */
		}
		/* dedicated background-color layer, sits at the very back */
		#page-bg {
			position: fixed;
			inset: 0;
			z-index: 0;
			background: #000000;            /* page background — change this to taste */
		}
		/* the animated canvas sits ABOVE the color layer (no negative z-index trap) */
		#bg {
			position: fixed;
			inset: 0;
			z-index: 1;
			pointer-events: none;
		}
		/* optional soft glow vignette, like the demo (purely visual, no text) */
		#glow {
			position: fixed;
			inset: 0;
			z-index: 2;
			pointer-events: none;
			background: radial-gradient(ellipse at center, rgba(255,255,255,0.06), transparent 55%);
		}
	</style>
</head>
<body>
	<div id="page-bg"></div>
	<div id="bg"></div>
	<div id="glow"></div>

	<script type="importmap">
	{
		"imports": {
			"three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
		}
	}
	</script>

	<script type="module">
		import * as THREE from 'three';

		// ---- Theme: 'dark' => light dots, 'light' => black dots (matches the original component) ----
		const THEME = 'dark';

		const container = document.getElementById('bg');

		const SEPARATION = 150;
		const AMOUNTX = 40;
		const AMOUNTY = 60;

		const scene = new THREE.Scene();
		scene.fog = new THREE.Fog(0xffffff, 2000, 10000);

		const camera = new THREE.PerspectiveCamera(
			60,
			window.innerWidth / window.innerHeight,
			1,
			10000,
		);
		camera.position.set(0, 355, 1220);

		const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
		renderer.setPixelRatio(window.devicePixelRatio);
		renderer.setSize(window.innerWidth, window.innerHeight);
		renderer.setClearColor(scene.fog.color, 0);
		container.appendChild(renderer.domElement);

		// Build the grid of points
		const positions = [];
		const colors = [];
		const geometry = new THREE.BufferGeometry();

		const dot = THEME === 'dark' ? 0.8 : 0.0; // 0.8 = soft light-gray, 0.0 = black

		for (let ix = 0; ix < AMOUNTX; ix++) {
			for (let iy = 0; iy < AMOUNTY; iy++) {
				const x = ix * SEPARATION - (AMOUNTX * SEPARATION) / 2;
				const y = 0;
				const z = iy * SEPARATION - (AMOUNTY * SEPARATION) / 2;
				positions.push(x, y, z);
				colors.push(dot, dot, dot);
			}
		}

		geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
		geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

		const material = new THREE.PointsMaterial({
			size: 8,
			vertexColors: true,
			transparent: true,
			opacity: 0.8,
			sizeAttenuation: true,
		});

		const points = new THREE.Points(geometry, material);
		scene.add(points);

		let count = 0;

		function animate() {
			requestAnimationFrame(animate);

			const positionAttribute = geometry.attributes.position;
			const arr = positionAttribute.array;

			let i = 0;
			for (let ix = 0; ix < AMOUNTX; ix++) {
				for (let iy = 0; iy < AMOUNTY; iy++) {
					const index = i * 3;
					arr[index + 1] =
						Math.sin((ix + count) * 0.3) * 50 +
						Math.sin((iy + count) * 0.5) * 50;
					i++;
				}
			}

			positionAttribute.needsUpdate = true;
			renderer.render(scene, camera);
			count += 0.1;
		}

		function handleResize() {
			camera.aspect = window.innerWidth / window.innerHeight;
			camera.updateProjectionMatrix();
			renderer.setSize(window.innerWidth, window.innerHeight);
		}
		window.addEventListener('resize', handleResize);

		animate();
	</script>

<style>
#pfbot-root{--pfa:#1a9fcf;position:fixed;right:20px;bottom:20px;z-index:2147483000;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}

</style>
<script>
(function(){
 var KB=window.CHATBOT_KB; if(!KB||document.getElementById('pfbot-root'))return;
 var root=document.createElement('div'); root.id='pfbot-root';
 root.innerHTML=
  '<button id="pfbot-launch" aria-label="Open assistant"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-8.9 8.4 8.4 8.4 0 0 1-3.8-.9L3 21l2-5.3A8.4 8.4 0 0 1 12 3.1a8.4 8.4 0 0 1 9 8.4z"/></svg></button>'+
  '<div id="pfbot-panel" role="dialog" aria-label="Site assistant">'+
   '<div id="pfbot-head"><div class="av">✨</div><div><div class="t"></div><div class="s">AI assistant · ask me anything</div></div><button id="pfbot-x" aria-label="Close">×</button></div>'+
   '<div id="pfbot-log"></div><div id="pfbot-chips"></div>'+
   '<form id="pfbot-form"><input id="pfbot-input" autocomplete="off" placeholder="Type your question…"/><button id="pfbot-send">➤</button></form>'+
  '</div>';
 document.body.appendChild(root);
 root.style.setProperty('--pfa', KB.accent||'#1a9fcf');
 root.querySelector('#pfbot-head .t').textContent=KB.name||'Assistant';
 var log=root.querySelector('#pfbot-log'), chips=root.querySelector('#pfbot-chips'),
     form=root.querySelector('#pfbot-form'), input=root.querySelector('#pfbot-input'),
     launch=root.querySelector('#pfbot-launch'), greeted=false;
 function bubble(role,txt){var d=document.createElement('div');d.className='pfb '+role;d.textContent=txt;log.appendChild(d);log.scrollTop=log.scrollHeight;return d;}
 function botSay(txt){var tp=bubble('bot typing','typing…');setTimeout(function(){tp.remove();bubble('bot',txt);},380+Math.min(900,txt.length*7));}
 function renderChips(){chips.innerHTML='';(KB.suggestions||[]).forEach(function(s){var b=document.createElement('button');b.className='pfchip';b.type='button';b.textContent=s;b.onclick=function(){send(s);};chips.appendChild(b);});}
 function answer(q){
   q=(q||'').toLowerCase().trim();
   if(/^(hi|hey|hello|yo|sup|good (morning|evening|afternoon))\b/.test(q))return KB.intro;
   if(/(thank|thanks|thx|cheers|appreciate)/.test(q))return "Anytime! Anything else you want to know?";
   if(/(bye|goodbye|see ya|that's all|done)/.test(q))return "Take care — come back if you need anything.";
   var best=null,bs=0;
   (KB.qa||[]).forEach(function(it){var s=0;it.k.forEach(function(k){if(q.indexOf(k)>=0)s+=k.length;});if(s>bs){bs=s;best=it;}});
   return best?best.a:KB.fallback;
 }
 function send(txt){txt=(txt||'').trim();if(!txt)return;bubble('me',txt);input.value='';botSay(answer(txt));}
 form.addEventListener('submit',function(e){e.preventDefault();send(input.value);});
 launch.addEventListener('click',function(){var o=root.getAttribute('data-open')==='true';root.setAttribute('data-open',o?'false':'true');if(!o&&!greeted){greeted=true;renderChips();botSay(KB.intro);input.focus();}});
 root.querySelector('#pfbot-x').addEventListener('click',function(){root.setAttribute('data-open','false');});
})();
</script>

<!-- pf-chatbot:end -->
