<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>IRONHAND — Photo Showcase (standalone demo)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#0D0D0F; --ink-2:#141417; --ink-3:#1C1C21; --cream:#F4EFE7; --muted:#9A958C;
    --copper:#F2752B; --brass:#E8B04B; --line:rgba(244,239,231,.12);
    --ease:cubic-bezier(.22,.61,.36,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{ background:var(--ink); color:var(--cream); font-family:"Inter",system-ui,sans-serif;
        min-height:100vh; -webkit-font-smoothing:antialiased; overflow-x:hidden; position:relative; }
  /* subtle copper fade-grid backdrop */
  body::before{ content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:linear-gradient(to right,rgba(244,239,231,.05) 1px,transparent 1px),linear-gradient(to bottom,rgba(244,239,231,.05) 1px,transparent 1px);
    background-size:62px 62px;
    -webkit-mask-image:radial-gradient(120% 90% at 50% 28%,#000 0%,rgba(0,0,0,.4) 55%,transparent 82%);
            mask-image:radial-gradient(120% 90% at 50% 28%,#000 0%,rgba(0,0,0,.4) 55%,transparent 82%); }
  body::after{ content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
    background:radial-gradient(70% 50% at 50% 38%, rgba(242,117,43,.12), transparent 60%); }

  .wrap{ position:relative; z-index:1; max-width:1180px; margin:0 auto; padding:40px 24px 54px; }
  .head{ text-align:center; max-width:880px; margin:0 auto 8px; }
  .kicker{ display:inline-flex; align-items:center; gap:10px; font-family:"Syne"; font-weight:700;
           font-size:12px; letter-spacing:.22em; text-transform:uppercase; color:var(--copper); }
  .kicker::before,.kicker::after{ content:""; width:26px; height:1.5px; background:var(--copper); display:inline-block; }
  h1{ font-family:"Syne"; font-weight:800; font-size:clamp(28px,3.5vw,42px); letter-spacing:-.02em; margin:12px 0 0; line-height:1.04; }
  h1 em{ font-style:normal; color:var(--copper); }

  /* ---------- coverflow fan ---------- */
  .stage{ position:relative; height:clamp(380px,44vw,460px); margin-top:14px; }
  .cf{ position:absolute; left:50%; top:50%; width:clamp(210px,22vw,266px); aspect-ratio:3/4.35;
       border-radius:24px; overflow:hidden; cursor:pointer; background:#0a0a0c;
       transform:translate(-50%,-50%); transform-origin:center bottom;
       transition:transform .62s var(--ease), opacity .5s var(--ease), box-shadow .5s var(--ease), border-color .5s;
       will-change:transform,opacity; box-shadow:0 30px 60px rgba(0,0,0,.55);
       border:1px solid rgba(244,239,231,.08); }
  .cf img{ width:100%; height:100%; object-fit:cover; display:block; pointer-events:none; }
  .cf::after{ content:""; position:absolute; inset:0; background:linear-gradient(180deg,transparent 45%,rgba(7,5,3,.55) 100%); opacity:0; transition:opacity .5s; }
  .cf.is-active{ border-color:rgba(242,117,43,.55); box-shadow:0 40px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(242,117,43,.4), 0 18px 50px rgba(242,117,43,.22); }
  .cf.is-active::after{ opacity:1; }

  /* ---------- active review caption ---------- */
  .cap{ text-align:center; max-width:640px; margin:20px auto 0; min-height:128px; }
  .cap .stars{ color:var(--brass); letter-spacing:3px; font-size:16px; }
  .cap .q{ font-family:"Syne"; font-weight:700; font-size:clamp(18px,2.1vw,23px); line-height:1.4; margin:12px 0 14px; color:var(--cream); }
  .cap .who{ font-size:14px; color:var(--muted); }
  .cap .who b{ color:var(--cream); font-family:"Syne"; font-weight:700; }
  .cap.swap{ animation:capIn .5s var(--ease); }
  @keyframes capIn{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;} }

  /* ---------- controls ---------- */
  .ctrl{ display:flex; align-items:center; justify-content:center; gap:20px; margin-top:26px; }
  .nav{ width:50px; height:50px; border-radius:50%; border:1.5px solid var(--line); background:rgba(20,20,23,.6);
        backdrop-filter:blur(8px); color:var(--cream); cursor:pointer; display:grid; place-items:center;
        transition:.25s var(--ease); }
  .nav:hover{ background:var(--copper); border-color:var(--copper); color:#160c03; transform:translateY(-2px); }
  .nav svg{ width:20px; height:20px; }
  .dots{ display:flex; align-items:center; gap:9px; }
  .dot{ width:8px; height:8px; border-radius:50%; background:rgba(244,239,231,.22); cursor:pointer; transition:.3s var(--ease); }
  .dot.on{ background:var(--copper); width:26px; border-radius:6px; }

  .hint{ text-align:center; color:var(--muted); font-size:12.5px; margin-top:22px; letter-spacing:.02em; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <span class="kicker">Real jobs · real Denver homes</span>
      <h1>See the work, <em>hear the homeowner.</em></h1>
    </div>

    <div class="stage" id="stage" aria-roledescription="carousel"></div>

    <div class="cap" id="cap"></div>

    <div class="ctrl">
      <button class="nav" id="prev" aria-label="Previous"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button>
      <div class="dots" id="dots"></div>
      <button class="nav" id="next" aria-label="Next"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg></button>
    </div>

    <p class="hint">Click a photo, use the arrows, swipe, or use ← → keys</p>
  </div>

<script>
  const U = id => `https://images.unsplash.com/${id}?auto=format&fit=crop&w=640&q=80`;
  const DATA = [
    { img:'photo-1542013936693-884638332954', stars:5, q:"Sewer backed up at 11pm. Crew here in 45 minutes, jetted the line, price matched the quote exactly.", name:"Marcus G.", loc:"Wash Park, Denver" },
    { img:'photo-1607472586893-edb57bdc0e39', stars:5, q:"Whole-house repipe in one day. Boot covers on, everything taped off — you'd never know they were here.", name:"Lena P.", loc:"Aurora" },
    { img:'photo-1581092580497-e0d23cbdf1dc', stars:5, q:"Two companies missed a slab leak. IRONHAND found it in 20 minutes without jackhammering my kitchen.", name:"Derek R.", loc:"Lakewood" },
    { img:'photo-1585704032915-c3400ca199e7', stars:5, q:"Tankless install, clean and on time. They walked me through the warranty and labeled my breaker panel.", name:"Sofia C.", loc:"Arvada" },
    { img:'photo-1584622650111-993a426fbf0a', stars:5, q:"Upfront pricing is real — one fixed price, no hourly meter creeping up while the guy thinks about it.", name:"Tom N.", loc:"Centennial" },
    { img:'photo-1621905251918-48416bd8575a', stars:5, q:"Frozen pipe burst over the holidays. Answered on the second ring, water back on the same morning.", name:"Amara K.", loc:"Boulder" },
    { img:'photo-1521207418485-99c705420785', stars:5, q:"Replaced my water heater and caught a venting issue the last installer left dangerous. They know code.", name:"James B.", loc:"Denver" },
  ];

  const stage = document.getElementById('stage');
  const dotsEl = document.getElementById('dots');
  const capEl = document.getElementById('cap');
  const N = DATA.length;
  let active = Math.floor(N/2);

  // build cards + dots
  const cards = DATA.map((d,i)=>{
    const c = document.createElement('div');
    c.className = 'cf';
    c.innerHTML = `<img src="${U(d.img)}" alt="${d.name} — plumbing job" loading="lazy">`;
    c.addEventListener('click', ()=> setActive(i));
    stage.appendChild(c);
    const dot = document.createElement('span');
    dot.className = 'dot';
    dot.addEventListener('click', ()=> setActive(i));
    dotsEl.appendChild(dot);
    return c;
  });
  const dots = [...dotsEl.children];

  function layout(){
    cards.forEach((c,i)=>{
      let off = i - active;
      if (off >  N/2) off -= N;          // wrap for a symmetric infinite fan
      if (off < -N/2) off += N;
      const a = Math.abs(off);
      const x = off * 134;
      const y = a * 26;                  // dip down -> arc, center is the peak
      const rot = off * 7;               // fan tilt
      const scale = off===0 ? 1.07 : Math.max(0.6, 0.87 - (a-1)*0.11);
      c.style.transform = `translate(-50%,-50%) translateX(${x}px) translateY(${y}px) rotate(${rot}deg) scale(${scale})`;
      c.style.zIndex = 50 - a;
      c.style.opacity = a > 4 ? 0 : (1 - a*0.16);
      c.classList.toggle('is-active', off===0);
    });
    dots.forEach((d,i)=> d.classList.toggle('on', i===active));
  }

  function renderCap(){
    const d = DATA[active];
    capEl.classList.remove('swap'); void capEl.offsetWidth;
    capEl.innerHTML = `<div class="stars">${'★'.repeat(d.stars)}</div>
      <p class="q">“${d.q}”</p>
      <div class="who"><b>${d.name}</b> · ${d.loc}</div>`;
    capEl.classList.add('swap');
  }

  function setActive(i){ active = ((i % N) + N) % N; layout(); renderCap(); }

  document.getElementById('prev').addEventListener('click', ()=> setActive(active-1));
  document.getElementById('next').addEventListener('click', ()=> setActive(active+1));
  window.addEventListener('keydown', e=>{ if(e.key==='ArrowLeft') setActive(active-1); if(e.key==='ArrowRight') setActive(active+1); });

  // swipe / drag
  let sx=null;
  stage.addEventListener('pointerdown', e=> sx=e.clientX);
  window.addEventListener('pointerup', e=>{ if(sx===null) return; const dx=e.clientX-sx; if(Math.abs(dx)>50) setActive(active + (dx<0?1:-1)); sx=null; });

  layout(); renderCap();
</script>

<style>
#pfbot-root{--pfa:#f2752b;position:fixed;right:20px;bottom:20px;z-index:2147483000;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
#pfbot-launch{width:58px;height:58px;border:0;border-radius:50%;background:var(--pfa);color:#fff;cursor:pointer;box-shadow:0 10px 30px rgba(0,0,0,.28);display:grid;place-items:center;transition:transform .15s}
#pfbot-launch:hover{transform:scale(1.06)}
#pfbot-launch svg{width:26px;height:26px}
#pfbot-panel{position:absolute;right:0;bottom:72px;width:350px;max-width:calc(100vw - 32px);height:520px;max-height:calc(100vh - 110px);background:#fff;border-radius:18px;box-shadow:0 24px 60px rgba(0,0,0,.32);display:none;flex-direction:column;overflow:hidden;border:1px solid rgba(0,0,0,.08)}
#pfbot-root[data-open="true"] #pfbot-panel{display:flex}
#pfbot-head{background:var(--pfa);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px}
#pfbot-head .t{font-weight:700;font-size:15px;line-height:1.1}
#pfbot-head .s{font-size:11px;opacity:.85}
#pfbot-head .av{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.22);display:grid;place-items:center;font-size:17px}
#pfbot-x{margin-left:auto;background:0;border:0;color:#fff;font-size:20px;cursor:pointer;opacity:.85;line-height:1}
#pfbot-log{flex:1;overflow-y:auto;padding:14px;background:#f6f7f9;display:flex;flex-direction:column;gap:10px}
.pfb{max-width:84%;padding:10px 13px;border-radius:14px;font-size:13.5px;line-height:1.5;white-space:pre-wrap;word-wrap:break-word}
.pfb.bot{background:#fff;color:#1d2430;border:1px solid #e7e9ee;border-bottom-left-radius:4px;align-self:flex-start}
.pfb.me{background:var(--pfa);color:#fff;border-bottom-right-radius:4px;align-self:flex-end}
.pfb.typing{color:#8a93a3;font-style:italic}
#pfbot-chips{display:flex;flex-wrap:wrap;gap:7px;padding:10px 12px;background:#fff;border-top:1px solid #eef0f3}
.pfchip{border:1px solid var(--pfa);color:var(--pfa);background:#fff;border-radius:999px;padding:6px 11px;font-size:12px;cursor:pointer;transition:.12s}
.pfchip:hover{background:var(--pfa);color:#fff}
#pfbot-form{display:flex;gap:8px;padding:11px;border-top:1px solid #eef0f3;background:#fff}
#pfbot-input{flex:1;border:1px solid #d8dce3;border-radius:10px;padding:10px 12px;font-size:13.5px;outline:0}
#pfbot-input:focus{border-color:var(--pfa)}
#pfbot-send{border:0;background:var(--pfa);color:#fff;border-radius:10px;padding:0 15px;cursor:pointer;font-size:14px}
@media(max-width:430px){#pfbot-panel{width:calc(100vw - 24px);right:-2px}}
</style>
<script>
(function(){
 var KB=window.CHATBOT_KB; if(!KB||document.getElementById('pfbot-root'))return;
 var root=document.createElement('div'); root.id='pfbot-root';
 root.innerHTML=
  '<button id="pfbot-launch" aria-label="Open assistant"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-8.9 8.4 8.4 8.4 0 0 1-3.8-.9L3 21l2-5.3A8.4 8.4 0 0 1 12 3.1a8.4 8.4 0 0 1 9 8.4z"/></svg></button>'+
  '<div id="pfbot-panel" role="dialog" aria-label="Site assistant">'+
   '<div id="pfbot-head"><div class="av">✨</div><div><div class="t"></div><div class="s">AI assistant · ask me anything</div></div><button id="pfbot-x" aria-label="Close">×</button></div>'+
   '<div id="pfbot-log"></div><div id="pfbot-chips"></div>'+
   '<form id="pfbot-form"><input id="pfbot-input" autocomplete="off" placeholder="Type your question…"/><button id="pfbot-send">➤</button></form>'+
  '</div>';
 document.body.appendChild(root);
 root.style.setProperty('--pfa', KB.accent||'#1a9fcf');
 root.querySelector('#pfbot-head .t').textContent=KB.name||'Assistant';
 var log=root.querySelector('#pfbot-log'), chips=root.querySelector('#pfbot-chips'),
     form=root.querySelector('#pfbot-form'), input=root.querySelector('#pfbot-input'),
     launch=root.querySelector('#pfbot-launch'), greeted=false;
 function bubble(role,txt){var d=document.createElement('div');d.className='pfb '+role;d.textContent=txt;log.appendChild(d);log.scrollTop=log.scrollHeight;return d;}
 function botSay(txt){var tp=bubble('bot typing','typing…');setTimeout(function(){tp.remove();bubble('bot',txt);},380+Math.min(900,txt.length*7));}
 function renderChips(){chips.innerHTML='';(KB.suggestions||[]).forEach(function(s){var b=document.createElement('button');b.className='pfchip';b.type='button';b.textContent=s;b.onclick=function(){send(s);};chips.appendChild(b);});}
 function answer(q){
   q=(q||'').toLowerCase().trim();
   if(/^(hi|hey|hello|yo|sup|good (morning|evening|afternoon))\b/.test(q))return KB.intro;
   if(/(thank|thanks|thx|cheers|appreciate)/.test(q))return "Anytime! Anything else you want to know?";
   if(/(bye|goodbye|see ya|that's all|done)/.test(q))return "Take care — come back if you need anything.";
   var best=null,bs=0;
   (KB.qa||[]).forEach(function(it){var s=0;it.k.forEach(function(k){if(q.indexOf(k)>=0)s+=k.length;});if(s>bs){bs=s;best=it;}});
   return best?best.a:KB.fallback;
 }
 function send(txt){txt=(txt||'').trim();if(!txt)return;bubble('me',txt);input.value='';botSay(answer(txt));}
 form.addEventListener('submit',function(e){e.preventDefault();send(input.value);});
 launch.addEventListener('click',function(){var o=root.getAttribute('data-open')==='true';root.setAttribute('data-open',o?'false':'true');if(!o&&!greeted){greeted=true;renderChips();botSay(KB.intro);input.focus();}});
 root.querySelector('#pfbot-x').addEventListener('click',function(){root.setAttribute('data-open','false');});
})();
</script>

<!-- pf-chatbot:end -->
