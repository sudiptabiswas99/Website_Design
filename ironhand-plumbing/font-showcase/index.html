<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>IRONHAND — Headline Font Showcase (15 options)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Archivo:wdth,wght@125,800;125,900&family=Archivo+Black&family=Anton&family=Oswald:wght@600;700&family=Bebas+Neue&family=Barlow+Semi+Condensed:wght@700;800&family=Sora:wght@700;800&family=Big+Shoulders+Display:wght@700;800;900&family=Saira+Condensed:wght@700;800&family=Teko:wght@600;700&family=Fjalla+One&family=Chivo:wght@800;900&family=Space+Grotesk:wght@700&family=Kanit:wght@700;800&family=Khand:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{ --ink:#0D0D0F; --ink-2:#141417; --cream:#F4EFE7; --muted:#9A958C; --copper:#F2752B; --line:rgba(244,239,231,.12); }
  *{box-sizing:border-box;margin:0;padding:0}
  body{ background:var(--ink); color:var(--cream); font-family:"Inter",system-ui,sans-serif; -webkit-font-smoothing:antialiased;
        background-image:radial-gradient(70% 45% at 82% -5%, rgba(242,117,43,.10), transparent 60%); }
  .wrap{ max-width:1180px; margin:0 auto; padding:0 28px; }
  .intro{ padding:52px 0 6px; }
  .eyebrow{ font-family:"Syne"; font-weight:700; font-size:12px; letter-spacing:.22em; text-transform:uppercase; color:var(--copper); }
  .intro h1{ font-family:"Syne"; font-weight:800; font-size:clamp(26px,3.6vw,42px); letter-spacing:-.02em; margin:12px 0 0; }
  .intro p{ color:var(--muted); max-width:72ch; margin:12px 0 0; font-size:15px; line-height:1.6; }
  .intro p b{ color:var(--cream); }

  .fb{ padding:34px 0; border-top:1px solid var(--line); }
  .meta{ display:flex; align-items:baseline; gap:13px; flex-wrap:wrap; margin-bottom:16px; }
  .meta .num{ font-family:"Syne"; font-weight:800; color:var(--copper); font-size:13px; min-width:24px; }
  .meta h3{ font-family:"Syne"; font-weight:800; font-size:19px; }
  .meta .tag{ font-size:11px; font-weight:700; letter-spacing:.03em; padding:3px 10px; border-radius:999px; border:1px solid var(--line); color:var(--muted); }
  .meta .tag.rec{ color:var(--copper); border-color:rgba(242,117,43,.45); }
  .meta .tag.fit{ color:#7ee0a8; border-color:rgba(40,180,110,.35); }
  .meta .tag.now{ color:var(--cream); }
  .meta p{ color:var(--muted); font-size:13px; flex-basis:100%; line-height:1.5; max-width:80ch; }
  .meta p b{ color:var(--cream); }

  .hl{ line-height:.94; letter-spacing:-.02em; }
  .hl span{ display:block; font-size:clamp(34px,5.6vw,72px); }
  .hl .out{ -webkit-text-stroke:1.6px var(--cream); color:transparent; }
  .hl .cop{ color:var(--copper); }

  /* per-font demo classes */
  .f-syne .hl span{ font-family:"Syne"; font-weight:800; text-transform:uppercase; }
  .f-archivo .hl span{ font-family:"Archivo"; font-weight:900; font-stretch:125%; font-variation-settings:"wdth" 125; text-transform:uppercase; }
  .f-archivoblack .hl span{ font-family:"Archivo Black"; font-weight:400; text-transform:uppercase; }
  .f-anton .hl span{ font-family:"Anton"; font-weight:400; text-transform:uppercase; }
  .f-oswald .hl span{ font-family:"Oswald"; font-weight:700; text-transform:uppercase; }
  .f-bebas .hl span{ font-family:"Bebas Neue"; font-weight:400; letter-spacing:.01em; }
  .f-barlow .hl span{ font-family:"Barlow Semi Condensed"; font-weight:800; text-transform:uppercase; }
  .f-sora .hl span{ font-family:"Sora"; font-weight:800; text-transform:uppercase; letter-spacing:-.03em; }
  .f-bigshoulders .hl span{ font-family:"Big Shoulders Display"; font-weight:800; text-transform:uppercase; }
  .f-saira .hl span{ font-family:"Saira Condensed"; font-weight:800; text-transform:uppercase; }
  .f-teko .hl span{ font-family:"Teko"; font-weight:700; text-transform:uppercase; line-height:.82; }
  .f-fjalla .hl span{ font-family:"Fjalla One"; font-weight:400; text-transform:uppercase; }
  .f-chivo .hl span{ font-family:"Chivo"; font-weight:900; text-transform:uppercase; }
  .f-space .hl span{ font-family:"Space Grotesk"; font-weight:700; text-transform:uppercase; }
  .f-kanit .hl span{ font-family:"Kanit"; font-weight:800; text-transform:uppercase; }
  .f-khand .hl span{ font-family:"Khand"; font-weight:700; text-transform:uppercase; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="intro">
      <div class="eyebrow">IRONHAND · 15 headline font options</div>
      <h1>Pick your headline type.</h1>
      <p>Your real hero headline in 15 professional display fonts (all free Google Fonts; <b>Inter stays the body font</b>). Green tag = strong fit for a heavy-duty trades brand. Tell me the number and I'll swap it into the live site.</p>
    </div>
  </div>
  <div class="wrap" id="list"></div>

<script>
  const FONTS = [
    {c:"f-syne",       n:"Syne",                   tag:["now","● In use now"], d:'Artsy geometric display. Distinctive but reads "design studio / fashion" — quirky letterforms undercut a rugged trades feel.'},
    {c:"f-archivo",    n:"Archivo (Expanded)",     tag:["rec","★ Recommended"], d:'Wide industrial grotesque. Broad, grounded, <b>premium</b>. Says "established, heavy-duty, professional" without shouting.'},
    {c:"f-bigshoulders",n:"Big Shoulders Display", tag:["fit","Strong trades fit"], d:'Industrial signage type designed for Chicago. <b>Rugged, civic, bold</b> — practically made for a build-tough brand.'},
    {c:"f-anton",      n:"Anton",                  tag:["fit","Strong trades fit"], d:'Ultra-bold condensed. Maximum punch and density — the classic <b>billboard / trades</b> headline.'},
    {c:"f-oswald",     n:"Oswald",                 tag:["fit","Strong trades fit"], d:'Professional condensed grotesque — the reliable default for service businesses. <b>Trustworthy, clean.</b>'},
    {c:"f-fjalla",     n:"Fjalla One",             tag:["fit","Strong trades fit"], d:'Sturdy condensed workhorse. <b>Solid, no-nonsense, confident</b> — reads like a company that shows up on time.'},
    {c:"f-bebas",      n:"Bebas Neue",             tag:["","Tall industrial"], d:'Tall all-caps condensed. Sleek, modern, great vertical presence. Slightly more "brand/lifestyle" than Anton.'},
    {c:"f-saira",      n:"Saira Condensed",        tag:["","Technical"], d:'Technical condensed grotesque. <b>Engineering precision</b> — squared, exact, industrial.'},
    {c:"f-khand",      n:"Khand",                  tag:["","Clean condensed"], d:'Crisp condensed humanist. Modern, highly legible, professional — lighter than Anton/Fjalla.'},
    {c:"f-teko",       n:"Teko",                   tag:["","Tall / compressed"], d:'Tall compressed technical face. High-impact and space-efficient — strong, modern, a little futuristic.'},
    {c:"f-archivoblack",n:"Archivo Black",         tag:["","Heavy neutral"], d:'Heavy single-weight grotesque. <b>Dense, authoritative, neutral</b> — maximum weight without condensing.'},
    {c:"f-chivo",      n:"Chivo",                  tag:["","Bold grotesque"], d:'Strong journalistic grotesque. Bold, confident, professional — newsroom-grade legibility.'},
    {c:"f-barlow",     n:"Barlow Semi Condensed",  tag:["","Clean & sturdy"], d:'Low-contrast grotesque with subtle transport/industrial DNA. <b>Modern, sturdy</b>; pairs seamlessly with Inter.'},
    {c:"f-kanit",      n:"Kanit",                  tag:["","Geometric bold"], d:'Geometric bold grotesque. Clean, contemporary, confident — modern without losing weight.'},
    {c:"f-space",      n:"Space Grotesk",          tag:["","Modern / techy"], d:'Modern grotesque with character. Techy but warm — the most contemporary of the set.'},
    {c:"f-sora",       n:"Sora",                   tag:["","Premium tech"], d:'Geometric modern. Clean "premium tech / SaaS" — the least blue-collar option here.'},
  ];
  const tagClass = t => t==="now"?"tag now":t==="rec"?"tag rec":t==="fit"?"tag fit":"tag";
  document.getElementById('list').innerHTML = FONTS.map((f,i)=>`
    <section class="fb ${f.c}">
      <div class="meta">
        <span class="num">${i===0?'NOW':String(i).padStart(2,'0')}</span>
        <h3>${f.n}</h3>
        <span class="${tagClass(f.tag[0])}">${f.tag[1]}</span>
        <p>${f.d}</p>
      </div>
      <div class="hl"><span>BUILT TOUGH.</span><span class="out">PRICED</span><span class="cop">HONEST.</span></div>
    </section>`).join('');
</script>

<!-- pf-chatbot:start -->
<script>window.CHATBOT_KB={"name": "IRONHAND — Headline Font Showcase", "accent": "#f2752b", "mode": "design", "intro": "Hi! I can describe this piece — IRONHAND — Headline Font Showcase (Headline type picker · 15 options). Ask what design, colors, buttons, fonts, layout or tech it uses, or how to build one like it.", "suggestions": ["What design?", "Colors", "Buttons", "Fonts", "How to build one"], "qa": [{"k": ["design", "style", "aesthetic", "look", "feel", "vibe", "theme"], "a": "IRONHAND — Headline Font Showcase — Headline type picker · 15 options. Style: Pick your headline type → live preview of the IRONHAND headline rendered in 15 candidate display typefaces. Palette: ink #0D0D0F, muted #9A958C. Typography: Inter, Syne, Archivo, Archivo Black."}, {"k": ["color", "colour", "palette", "hex", "accent", "brand color"], "a": "Palette — ink #0D0D0F, muted #9A958C. The primary accent is #f2752b."}, {"k": ["button", "btn", "cta", "call to action"], "a": "Buttons are fully-rounded pill."}, {"k": ["font", "type", "typography", "typeface", "headline font"], "a": "Typefaces: Inter, Syne, Archivo, Archivo Black."}, {"k": ["layout", "section", "structure", "flow", "page", "wireframe"], "a": "Page flow: Pick your headline type → live preview of the IRONHAND headline rendered in 15 candidate display typefaces."}, {"k": ["tech", "stack", "built", "build", "framework", "made", "code", "recreate", "rebuild", "library", "how do i build", "how to build", "how should i build"], "a": "Built with hand-written HTML/CSS/JS. To recreate it: type in Inter, Syne, Archivo, Archivo Black, accent #f2752b over your background, fully-rounded pill buttons, and structure it as — Pick your headline type → live preview of the IRONHAND headline rendered in 15 candidate display typefaces."}], "fallback": "I can talk about this site's design (colors, buttons, fonts, layout, tech) and how to rebuild it. Try a chip below."};</script>

<style>
#pfbot-root{--pfa:#f2752b;position:fixed;right:20px;bottom:20px;z-index:2147483000;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
#pfbot-launch{width:58px;height:58px;border:0;border-radius:50%;background:var(--pfa);color:#fff;cursor:pointer;box-shadow:0 10px 30px rgba(0,0,0,.28);display:grid;place-items:center;transition:transform .15s}
#pfbot-launch:hover{transform:scale(1.06)}
#pfbot-launch svg{width:26px;height:26px}
#pfbot-panel{position:absolute;right:0;bottom:72px;width:350px;max-width:calc(100vw - 32px);height:520px;max-height:calc(100vh - 110px);background:#fff;border-radius:18px;box-shadow:0 24px 60px rgba(0,0,0,.32);display:none;flex-direction:column;overflow:hidden;border:1px solid rgba(0,0,0,.08)}
#pfbot-root[data-open="true"] #pfbot-panel{display:flex}
#pfbot-head{background:var(--pfa);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px}
#pfbot-head .t{font-weight:700;font-size:15px;line-height:1.1}
#pfbot-head .s{font-size:11px;opacity:.85}
#pfbot-head .av{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.22);display:grid;place-items:center;font-size:17px}
#pfbot-x{margin-left:auto;background:0;border:0;color:#fff;font-size:20px;cursor:pointer;opacity:.85;line-height:1}
#pfbot-log{flex:1;overflow-y:auto;padding:14px;background:#f6f7f9;display:flex;flex-direction:column;gap:10px}
.pfb{max-width:84%;padding:10px 13px;border-radius:14px;font-size:13.5px;line-height:1.5;white-space:pre-wrap;word-wrap:break-word}
.pfb.bot{background:#fff;color:#1d2430;border:1px solid #e7e9ee;border-bottom-left-radius:4px;align-self:flex-start}
.pfb.me{background:var(--pfa);color:#fff;border-bottom-right-radius:4px;align-self:flex-end}
.pfb.typing{color:#8a93a3;font-style:italic}
#pfbot-chips{display:flex;flex-wrap:wrap;gap:7px;padding:10px 12px;background:#fff;border-top:1px solid #eef0f3}
.pfchip{border:1px solid var(--pfa);color:var(--pfa);background:#fff;border-radius:999px;padding:6px 11px;font-size:12px;cursor:pointer;transition:.12s}
.pfchip:hover{background:var(--pfa);color:#fff}
#pfbot-form{display:flex;gap:8px;padding:11px;border-top:1px solid #eef0f3;background:#fff}
#pfbot-input{flex:1;border:1px solid #d8dce3;border-radius:10px;padding:10px 12px;font-size:13.5px;outline:0}
#pfbot-input:focus{border-color:var(--pfa)}
#pfbot-send{border:0;background:var(--pfa);color:#fff;border-radius:10px;padding:0 15px;cursor:pointer;font-size:14px}
@media(max-width:430px){#pfbot-panel{width:calc(100vw - 24px);right:-2px}}
</style>
<script>
(function(){
 var KB=window.CHATBOT_KB; if(!KB||document.getElementById('pfbot-root'))return;
 var root=document.createElement('div'); root.id='pfbot-root';
 root.innerHTML=
  '<button id="pfbot-launch" aria-label="Open assistant"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-8.9 8.4 8.4 8.4 0 0 1-3.8-.9L3 21l2-5.3A8.4 8.4 0 0 1 12 3.1a8.4 8.4 0 0 1 9 8.4z"/></svg></button>'+
  '<div id="pfbot-panel" role="dialog" aria-label="Site assistant">'+
   '<div id="pfbot-head"><div class="av">✨</div><div><div class="t"></div><div class="s">AI assistant · ask me anything</div></div><button id="pfbot-x" aria-label="Close">×</button></div>'+
   '<div id="pfbot-log"></div><div id="pfbot-chips"></div>'+
   '<form id="pfbot-form"><input id="pfbot-input" autocomplete="off" placeholder="Type your question…"/><button id="pfbot-send">➤</button></form>'+
  '</div>';
 document.body.appendChild(root);
 root.style.setProperty('--pfa', KB.accent||'#1a9fcf');
 root.querySelector('#pfbot-head .t').textContent=KB.name||'Assistant';
 var log=root.querySelector('#pfbot-log'), chips=root.querySelector('#pfbot-chips'),
     form=root.querySelector('#pfbot-form'), input=root.querySelector('#pfbot-input'),
     launch=root.querySelector('#pfbot-launch'), greeted=false;
 function bubble(role,txt){var d=document.createElement('div');d.className='pfb '+role;d.textContent=txt;log.appendChild(d);log.scrollTop=log.scrollHeight;return d;}
 function botSay(txt){var tp=bubble('bot typing','typing…');setTimeout(function(){tp.remove();bubble('bot',txt);},380+Math.min(900,txt.length*7));}
 function renderChips(){chips.innerHTML='';(KB.suggestions||[]).forEach(function(s){var b=document.createElement('button');b.className='pfchip';b.type='button';b.textContent=s;b.onclick=function(){send(s);};chips.appendChild(b);});}
 function answer(q){
   q=(q||'').toLowerCase().trim();
   if(/^(hi|hey|hello|yo|sup|good (morning|evening|afternoon))\b/.test(q))return KB.intro;
   if(/(thank|thanks|thx|cheers|appreciate)/.test(q))return "Anytime! Anything else you want to know?";
   if(/(bye|goodbye|see ya|that's all|done)/.test(q))return "Take care — come back if you need anything.";
   var best=null,bs=0;
   (KB.qa||[]).forEach(function(it){var s=0;it.k.forEach(function(k){if(q.indexOf(k)>=0)s+=k.length;});if(s>bs){bs=s;best=it;}});
   return best?best.a:KB.fallback;
 }
 function send(txt){txt=(txt||'').trim();if(!txt)return;bubble('me',txt);input.value='';botSay(answer(txt));}
 form.addEventListener('submit',function(e){e.preventDefault();send(input.value);});
 launch.addEventListener('click',function(){var o=root.getAttribute('data-open')==='true';root.setAttribute('data-open',o?'false':'true');if(!o&&!greeted){greeted=true;renderChips();botSay(KB.intro);input.focus();}});
 root.querySelector('#pfbot-x').addEventListener('click',function(){root.setAttribute('data-open','false');});
})();
</script>

<!-- pf-chatbot:end -->
</body>
</html>
