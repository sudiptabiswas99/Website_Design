<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Video Background — Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #000; overflow: hidden; }

  /* ---- Background stage: two crossfading layers = seamless endless zoom-in ---- */
  .bg-stage { position: fixed; inset: 0; z-index: 0; background: #000; }
  .bg-layer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;        /* fills the screen — true "background" behaviour */
    will-change: opacity;     /* smooth crossfade */
    opacity: 0;
  }

  /* ---- Optional darkening overlay (off by default) ---- */
  .overlay {
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,.35), rgba(0,0,0,.55));
    z-index: 1;
    opacity: 0;
    transition: opacity .35s ease;
    pointer-events: none;
  }
  body.dim .overlay { opacity: 1; }

  /* ---- Floating preview controls (bottom-right, auto-fade) ---- */
  .controls {
    position: fixed;
    bottom: 22px;
    right: 22px;
    z-index: 3;
    display: flex;
    gap: 8px;
    padding: 8px;
    background: rgba(12,14,18,.55);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,.14);
    border-radius: 14px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
    transition: opacity .4s ease, transform .4s ease;
  }
  .controls.hidden { opacity: 0; transform: translateY(10px); pointer-events: none; }
  .controls button {
    appearance: none;
    border: 1px solid rgba(255,255,255,.16);
    background: rgba(255,255,255,.06);
    color: #eef1f5;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .01em;
    padding: 9px 13px;
    border-radius: 9px;
    cursor: pointer;
    transition: background .18s ease, border-color .18s ease;
  }
  .controls button:hover { background: rgba(255,255,255,.14); border-color: rgba(255,255,255,.3); }
  .controls button.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }

  /* ---- Tiny corner hint ---- */
  .hint {
    position: fixed;
    bottom: 26px;
    left: 22px;
    z-index: 3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
    font-size: 12px;
    color: rgba(255,255,255,.55);
    letter-spacing: .02em;
    transition: opacity .4s ease;
  }
  .hint.hidden { opacity: 0; }
</style>
</head>
<body>
  <div class="bg-stage">
    <video class="bg-layer" id="layA" muted loop playsinline preload="auto">
      <source src="assets/zoomin-1080.mp4" type="video/mp4" />
    </video>
    <video class="bg-layer" id="layB" muted loop playsinline preload="auto">
      <source src="assets/zoomin-1080.mp4" type="video/mp4" />
    </video>
  </div>

  <div class="overlay"></div>

  <div class="controls" id="controls">
    <button id="dimBtn">Darken</button>
    <button id="soundBtn">Sound on</button>
    <button id="replayBtn">Replay</button>
  </div>
  <div class="hint" id="hint">Slow endless zoom-in · move mouse for controls · standalone preview</div>

  <script>
    // --- Endless slow zoom-in via two crossfading copies of the reversed clip ---
    const CLIP = 8.041667;   // source duration (seconds)
    const RATE = 0.5;        // playback speed: lower = slower zoom. 0.5 -> ~16s per pass
    const HALF = CLIP / 2;

    const layA = document.getElementById('layA');
    const layB = document.getElementById('layB');
    const layers = [layA, layB];

    const body     = document.body;
    const dimBtn   = document.getElementById('dimBtn');
    const soundBtn = document.getElementById('soundBtn');
    const replay   = document.getElementById('replayBtn');
    const controls = document.getElementById('controls');
    const hint     = document.getElementById('hint');

    // Start the two layers half a cycle apart so one is always mid-zoom while
    // the other resets under cover of opacity 0.
    function arm() {
      layers.forEach(v => { v.playbackRate = RATE; v.muted = true; });
      try { layA.currentTime = 0; } catch (e) {}
      try { layB.currentTime = HALF; } catch (e) {}
      layA.play().catch(()=>{});
      layB.play().catch(()=>{});
    }
    layA.addEventListener('loadedmetadata', arm);
    layB.addEventListener('loadedmetadata', arm);
    arm();

    // Per-frame crossfade. opacity_A = sin^2, opacity_B = sin^2 of the offset
    // phase; because B runs half a cycle ahead, the two always sum to ~1 (no
    // black flash) and each fades to 0 exactly at its own loop reset.
    function frame() {
      const a = layA.currentTime % CLIP;
      const b = layB.currentTime % CLIP;
      layA.style.opacity = Math.sin(Math.PI * (a / CLIP)) ** 2;
      layB.style.opacity = Math.sin(Math.PI * (b / CLIP)) ** 2;

      // Keep B ~half a cycle ahead of A; only correct on real drift (a reseek
      // costs a tiny decode hitch, so we avoid doing it every frame).
      const target = (a + HALF) % CLIP;
      let d = Math.abs(b - target);
      d = Math.min(d, CLIP - d);
      if (d > 0.4 && layB.readyState >= 2) layB.currentTime = target;

      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    // ---- Controls (unchanged behaviour) ----
    dimBtn.addEventListener('click', () => {
      body.classList.toggle('dim');
      dimBtn.classList.toggle('active', body.classList.contains('dim'));
    });

    // Source has no audio track, but keep the toggle wired to both layers.
    soundBtn.addEventListener('click', () => {
      const nowMuted = !layA.muted;
      layers.forEach(v => v.muted = nowMuted);
      soundBtn.textContent = nowMuted ? 'Sound on' : 'Sound off';
      soundBtn.classList.toggle('active', !nowMuted);
    });

    replay.addEventListener('click', arm);

    // Auto-hide controls after inactivity
    let idle;
    function show() {
      controls.classList.remove('hidden');
      hint.classList.remove('hidden');
      clearTimeout(idle);
      idle = setTimeout(() => {
        controls.classList.add('hidden');
        hint.classList.add('hidden');
      }, 2800);
    }
    window.addEventListener('mousemove', show);
    window.addEventListener('touchstart', show);
    show();
  </script>

<style>
#pfbot-root{--pfa:#1f6feb;position:fixed;right:20px;bottom:20px;z-index:2147483000;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
#pfbot-launch{width:58px;height:58px;border:0;border-radius:50%;background:var(--pfa);color:#fff;cursor:pointer;box-shadow:0 10px 30px rgba(0,0,0,.28);display:grid;place-items:center;transition:transform .15s}
#pfbot-launch:hover{transform:scale(1.06)}
#pfbot-launch svg{width:26px;height:26px}

#pfbot-root[data-open="true"] #pfbot-panel{display:flex}
#pfbot-head{background:var(--pfa);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px}
#pfbot-head .t{font-weight:700;font-size:15px;line-height:1.1}
#pfbot-head .s{font-size:11px;opacity:.85}

.pfb.bot{background:#fff;color:#1d2430;border:1px solid #e7e9ee;border-bottom-left-radius:4px;align-self:flex-start}
.pfb.me{background:var(--pfa);color:#fff;border-bottom-right-radius:4px;align-self:flex-end}
.pfb.typing{color:#8a93a3;font-style:italic}

<script>
(function(){
 var KB=window.CHATBOT_KB; if(!KB||document.getElementById('pfbot-root'))return;
 var root=document.createElement('div'); root.id='pfbot-root';
 root.innerHTML=
  '<button id="pfbot-launch" aria-label="Open assistant"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-8.9 8.4 8.4 8.4 0 0 1-3.8-.9L3 21l2-5.3A8.4 8.4 0 0 1 12 3.1a8.4 8.4 0 0 1 9 8.4z"/></svg></button>'+
  '<div id="pfbot-panel" role="dialog" aria-label="Site assistant">'+
   '<div id="pfbot-head"><div class="av">✨</div><div><div class="t"></div><div class="s">AI assistant · ask me anything</div></div><button id="pfbot-x" aria-label="Close">×</button></div>'+
   '<div id="pfbot-log"></div><div id="pfbot-chips"></div>'+
   '<form id="pfbot-form"><input id="pfbot-input" autocomplete="off" placeholder="Type your question…"/><button id="pfbot-send">➤</button></form>'+
  '</div>';
 document.body.appendChild(root);
 root.style.setProperty('--pfa', KB.accent||'#1a9fcf');
 root.querySelector('#pfbot-head .t').textContent=KB.name||'Assistant';
 var log=root.querySelector('#pfbot-log'), chips=root.querySelector('#pfbot-chips'),
     form=root.querySelector('#pfbot-form'), input=root.querySelector('#pfbot-input'),
     launch=root.querySelector('#pfbot-launch'), greeted=false;
 function bubble(role,txt){var d=document.createElement('div');d.className='pfb '+role;d.textContent=txt;log.appendChild(d);log.scrollTop=log.scrollHeight;return d;}
 function botSay(txt){var tp=bubble('bot typing','typing…');setTimeout(function(){tp.remove();bubble('bot',txt);},380+Math.min(900,txt.length*7));}
 function renderChips(){chips.innerHTML='';(KB.suggestions||[]).forEach(function(s){var b=document.createElement('button');b.className='pfchip';b.type='button';b.textContent=s;b.onclick=function(){send(s);};chips.appendChild(b);});}
 function answer(q){
   q=(q||'').toLowerCase().trim();
   if(/^(hi|hey|hello|yo|sup|good (morning|evening|afternoon))\b/.test(q))return KB.intro;
   if(/(thank|thanks|thx|cheers|appreciate)/.test(q))return "Anytime! Anything else you want to know?";
   if(/(bye|goodbye|see ya|that's all|done)/.test(q))return "Take care — come back if you need anything.";
   var best=null,bs=0;
   (KB.qa||[]).forEach(function(it){var s=0;it.k.forEach(function(k){if(q.indexOf(k)>=0)s+=k.length;});if(s>bs){bs=s;best=it;}});
   return best?best.a:KB.fallback;
 }
 function send(txt){txt=(txt||'').trim();if(!txt)return;bubble('me',txt);input.value='';botSay(answer(txt));}
 form.addEventListener('submit',function(e){e.preventDefault();send(input.value);});
 launch.addEventListener('click',function(){var o=root.getAttribute('data-open')==='true';root.setAttribute('data-open',o?'false':'true');if(!o&&!greeted){greeted=true;renderChips();botSay(KB.intro);input.focus();}});
 root.querySelector('#pfbot-x').addEventListener('click',function(){root.setAttribute('data-open','false');});
})();
</script>
